    <div class="container">
        <h1 class="page-title">Write a New Post</h1>
        
        <div class="form-card profile-form" style="max-width: 900px;">
            <form id="write-post-form">
                
                <div class="form-group">
                    <label for="post-title">Title</label>
                    <input type="text" id="post-title" name="post-title" required placeholder="Enter a descriptive title">
                </div>

                <div class="form-group">
                    <label for="post-category">Category</label>
                    <select id="post-category" name="post-category" required>
                        <option value="" disabled selected>Select a category...</option>
                        <option value="reviews">Build Review</option>
                        <option value="errors">Error Board</option>
                        <option value="notices" id="admin-notice-option">Notice (Admin Only)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="post-tags">Product Tags</label>
                    <input type="text" id="post-tags" name="post-tags" placeholder="e.g. RTX 4070, i5-14600K">
                    <small class="form-tags-hint">Separate tags with a comma ( , )</small>
                </div>

                <div class="form-group">
                    <label for="post-image">Attach Image (Optional)</label>
                    <input type="file" id="post-image" name="post-image" accept="image/*" class="file-input-field">
                    <div id="image-preview" class="image-preview-box"></div>
                    <small class="form-tags-hint">Max 10MB. (Note: Image cannot be changed in 'Edit' mode for now.)</small>
                </div>

                <div class="form-group">
                    <label for="post-content">Content</label>
                    <textarea id="post-content" name="post-content" rows="10" placeholder="Write your post here..."></textarea>
                </div>

                <div id="upload-progress" class="upload-progress-bar" style="display: none;">
                    Uploading image... Please wait.
                </div>

                <button type="submit" class="form-button">Publish Post</button>
            </form>
        </div>

    </div>
